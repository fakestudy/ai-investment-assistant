services:
  nginx:
    image: nginx:1.27-alpine
    container_name: investment-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./infra/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16-alpine
    container_name: investment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: investment
      POSTGRES_PASSWORD: investment
      POSTGRES_DB: investment
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investment -d investment"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    container_name: investment-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: investment
      RABBITMQ_DEFAULT_PASS: investment
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: investment-pgweb
    restart: unless-stopped
    ports:
      - "8082:8081"
    command:
      - "--bind=0.0.0.0"
      - "--listen=8081"
      - "--url=postgres://investment:investment@postgres:5432/investment?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  rabbitmq-data:

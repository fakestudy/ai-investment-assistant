services:
  postgres:
    image: postgres:16-alpine
    container_name: investment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: investment
      POSTGRES_PASSWORD: investment
      POSTGRES_DB: investment
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investment -d investment"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:

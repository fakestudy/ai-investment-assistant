services:
  nginx:
    image: nginx:1.27-alpine
    container_name: investment-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./infra/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16-alpine
    container_name: investment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: investment
      POSTGRES_PASSWORD: investment
      POSTGRES_DB: investment
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investment -d investment"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
